<!-- Balance Card -->
<div class="balance-card" th:if="${account != null}">
    <div class="row align-items-center">
        <div class="col-md-6">
            <h5>Your Balance</h5>
            <h3>₹<span th:text="${#numbers.formatDecimal(account.balance, 0, 2)}">0.00</span></h3>
            <p class="mb-0">Account Number: <span th:text="${account.accountNumber}">XXXXXXXXXX</span></p>
        </div>
        <div class="col-md-6 text-md-end">
            <i class="bi bi-wallet2" style="font-size: 4rem; opacity: 0.5;"></i>
        </div>
    </div>
</div>
<div class="balance-card" th:unless="${account != null}">
    <div class="row align-items-center">
        <div class="col-md-6">
            <h5>Your Balance</h5>
            <h3>₹0.00</h3>
            <p class="mb-0">Account: Not available</p>
        </div>
    </div>
</div>

<!-- Account Details - Add null check for user -->
<div class="card mt-4" th:if="${user != null}">
    <div class="card-header bg-white">
        <h5 class="mb-0">Account Details</h5>
    </div>
    <div class="card-body">
        <table class="table table-borderless">
            <tr>
                <td><strong>Account Holder:</strong></td>
                <td th:text="${user.name}">John Doe</td>
            </tr>
            <tr>
                <td><strong>Email:</strong></td>
                <td th:text="${user.email}">john@example.com</td>
            </tr>
            <tr>
                <td><strong>Username:</strong></td>
                <td th:text="${user.username}">johndoe</td>
            </tr>
        </table>
    </div>
</div>
